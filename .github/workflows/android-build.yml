name: Build Android APK

on:
  push:
    branches: [ "main", "master", "رئيسي" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20  # حدثنا الإصدار عشان نخلص من التحذير الأصفر اللي في الصورة

    - name: Install Dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Prepare Web Directory
      run: |
        mkdir -p www
        cp -r * www/ 2>/dev/null || true
        rm -rf www/www www/node_modules

    - name: Initialize and Build Project
      run: |
        npx cap init "Daraa Al Muslim" "com.hussein.daralmuslim" --web-dir=www
        npx cap add android
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Daraa-Al-Muslim-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
